# agents/openai.yaml — metadata for Codex UI (optional, ignored by Claude Code)
# Remove this file if you don't need Codex support

interface:
  display_name: "Human-Readable Skill Name"
  short_description: "25-64 character description"
  default_prompt: "Use $skill-name to [action]. [Optional additional instruction]."

policy:
  # true  = Codex can invoke this skill automatically based on context
  # false = user must invoke explicitly with $skill-name
  allow_implicit_invocation: true
